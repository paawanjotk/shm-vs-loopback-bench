# IPC demo: API and Streamlit are separate services so benchmarks (HFTApp) are not
# time-sliced with the UI in one container. Target: Linux x86_64.
services:
  hft-ipc-api:
    build: .
    image: hft-ipc-demo:latest
    entrypoint: ["/entrypoint-api.sh"]
    ports:
      - "8001:8000"
    environment:
      - PYTHONPATH=/app
      - HFTAPP_BIN=/opt/hft/bin/HFTApp
      - HFT_REPLAY_DIR=/data/replays
      - HFT_API_URL=http://127.0.0.1:8000
      # Optional: clone FlameGraph and mount or bake FLAMEGRAPH_HOME for flamegraphs
      # - FLAMEGRAPH_HOME=/opt/FlameGraph
    volumes:
      - hft-replays:/data/replays
    ipc: shareable
    shm_size: "256mb"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    # For perf record inside the container you may need one of:
    # privileged: true
    # cap_add: [SYS_ADMIN]
    # security_opt: ["seccomp:unconfined"]

  hft-ipc-demo:
    build: .
    image: hft-ipc-demo:latest
    entrypoint: ["/entrypoint-demo-ui.sh"]
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - HFT_API_URL=http://hft-ipc-api:8000
    depends_on:
      hft-ipc-api:
        condition: service_healthy

volumes:
  hft-replays:
